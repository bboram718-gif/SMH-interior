name: SMH ntfy alerts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"
    - cron: "*/5 * * * *"

jobs:
  morning_alert:
    name: Morning summary
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 21 * * *'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run morning alert
        env:
          SHEET_API: ${{ secrets.SHEET_API }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SMH_APP_URL: ${{ secrets.SMH_APP_URL }}
        run: node ntfy_morning.js

  upcoming_alert:
    name: Upcoming alert
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run upcoming alert
        env:
          SHEET_API: ${{ secrets.SHEET_API }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SMH_APP_URL: ${{ secrets.SMH_APP_URL }}
        run: node ntfy_upcoming.js
