<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMH 일정 관리</title>
<style>
:root{
  --bg:#faf9f6; --card:#ffffff; --line:#e7e4dc; --line2:#d3d0c7;
  --ink:#2c2c2a; --ink2:#5f5e5a; --ink3:#888780;
  --gold:#b8860b; --gold-bg:#faf3e0; --black:#1a1a1a;
  --blue:#185fa5; --blue-bg:#e6f1fb;
  --teal:#0f6e56; --teal-bg:#e1f5ee;
  --coral:#993c1d; --coral-bg:#faece7;
  --purple:#534ab7; --purple-bg:#eeedfe;
  --gray-bg:#f1efe8; --warn:#a35a00; --warn-bg:#fdf0db;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.5;font-size:15px;padding-bottom:90px}
.wrap{max-width:1000px;margin:0 auto;padding:0 14px}

/* header */
.top{position:sticky;top:0;z-index:30;background:var(--bg);padding:14px 0 8px;border-bottom:1px solid var(--line)}
.top h1{font-size:17px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:7px}
.logo{width:24px;height:24px;border-radius:6px;background:var(--black);color:var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.sub{font-size:12px;color:var(--ink3);margin-top:2px}
.tabs{display:flex;gap:4px;margin-top:10px}
.tab{flex:1;text-align:center;padding:9px 4px;font-size:14px;font-weight:500;color:var(--ink2);
  background:transparent;border:none;border-radius:8px;cursor:pointer;transition:.15s}
.tab.on{background:var(--black);color:#fff}

/* nav row */
.nav{display:flex;align-items:center;justify-content:space-between;margin:14px 0 4px;flex-wrap:wrap;gap:8px}
.nav .arrows{display:flex;gap:6px}
.btn{border:1px solid var(--line2);background:var(--card);border-radius:8px;padding:8px 13px;
  font-size:14px;color:var(--ink);cursor:pointer;font-weight:500;transition:.15s}
.btn:hover{background:var(--gray-bg)}
.btn.today{border-color:var(--gold);color:var(--gold)}
.range{font-size:16px;font-weight:600}
.addbar{background:var(--card);color:var(--ink);border:1px solid var(--line2);border-radius:8px;
  padding:8px 13px;font-size:14px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.addbar:hover{background:var(--gray-bg)}
.addbar:active{transform:scale(.98)}

/* 2-week board */
.board-area{margin-top:8px}
.board-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.board-wrap::-webkit-scrollbar{display:none}
.weekband{margin-bottom:6px;font-size:12px;color:var(--ink3);font-weight:600;padding-left:2px}
.board{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;min-width:660px;margin-bottom:0}
.bcell{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:7px 7px 8px;
  min-height:104px;cursor:pointer;transition:.1s;display:flex;flex-direction:column}
.bcell:hover{border-color:var(--line2);background:#fcfbf8}
.bcell.today{border-color:var(--gold);border-width:2px;background:var(--gold-bg)}
.bcell.weekend .bhead{color:#b0746a}
.bhead{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:5px;display:flex;gap:5px;align-items:baseline}
.bhead .bd{font-size:16px;color:var(--ink)}
.bcell.today .bhead .bd{color:var(--gold)}
.bev{font-size:11.5px;line-height:1.4;margin-bottom:3px;padding:3px 5px;border-radius:5px;
  display:flex;gap:4px;align-items:baseline}
.bev .bt{font-weight:600;font-size:10.5px;flex-shrink:0}
.bev .bn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bev.done{opacity:.45;text-decoration:line-through}
.bev.미팅{background:var(--blue-bg);color:var(--blue)}
.bev.견적{background:var(--gold-bg);color:var(--gold)}
.bev.실측{background:var(--purple-bg);color:var(--purple)}
.bev.공사{background:var(--coral-bg);color:var(--coral)}
.bev.기타{background:var(--gray-bg);color:var(--ink2)}
.bmore{font-size:10.5px;color:var(--ink3);margin-top:auto;padding-top:3px}
.scrollhint{display:none;font-size:11.5px;color:var(--ink3);text-align:center;margin:-4px 0 8px}

/* weekly memo */
.wmemo{background:#fcfbf7;border:1px dashed var(--line2);border-radius:10px;padding:10px 13px;margin:8px 0 18px;overflow:hidden}
.wmemo-h{font-size:12px;font-weight:600;color:var(--ink3);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.wmemo-scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;touch-action:pan-x}
.wmemo-scroll::-webkit-scrollbar{display:none}
.wmemo-list{display:inline-block;min-width:100%}
.wmemo-item{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13.5px;border-top:1px solid #eee6d6}
.wmemo-item:first-of-type{border-top:none}
.wmemo-item .wdot{color:var(--gold);flex-shrink:0}
.wmemo-item .wtag{flex-shrink:0}
.wmemo-item .wmemo-text{flex:1;min-width:0;white-space:nowrap}
.wmemo-list .wmemo-item{width:max-content;min-width:100%}
.wmemo-btn{background:none;border:1px solid var(--line2);border-radius:5px;padding:0;
  width:20px;height:20px;cursor:pointer;flex-shrink:0;color:var(--ink2);position:relative;
  display:inline-flex;align-items:center;justify-content:center}
.wmemo-btn::after{content:"";position:absolute;top:-9px;left:-9px;right:-9px;bottom:-9px}
.wmemo-btn svg{width:12px;height:12px}
.wmemo-btn:active{background:var(--gold-bg);color:var(--gold);border-color:var(--gold)}
.wmemo-add{font-size:12.5px;color:var(--gold);cursor:pointer;font-weight:500;padding:5px 0 0;display:inline-flex;gap:4px;align-items:center}
.wmemo-add:hover{text-decoration:underline}
.wmemo-empty{font-size:12.5px;color:var(--ink3);padding:2px 0}

/* attention - collapsed bar at bottom */
.attn-bar{margin:4px 0 10px;border:1px solid #ecd9b3;background:var(--warn-bg);border-radius:10px;overflow:hidden}
.attn-toggle{padding:11px 15px;font-size:13.5px;font-weight:600;color:var(--warn);cursor:pointer;
  display:flex;align-items:center;gap:7px}
.attn-toggle:hover{background:#fcf3df}
.attn-list{display:none;padding:0 15px 10px}
.attn-list.open{display:block}
.attn-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid #efe1c4;font-size:13.5px}
.attn-date{color:var(--warn);font-weight:600;min-width:42px;font-size:12.5px}
.attn-body{flex:1}
.attn-check{border:1px solid var(--warn);background:transparent;color:var(--warn);
  border-radius:7px;padding:5px 11px;font-size:12.5px;cursor:pointer;font-weight:500;white-space:nowrap}
.attn-check:hover{background:#fff}

/* month */
.cal{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:8px;touch-action:pan-y}
.dow{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--line)}
.dow div{text-align:center;font-size:11px;color:var(--ink3);padding:7px 0;font-weight:500}
.dow .sun{color:#c0392b}.dow .sat{color:#2471a3}
.grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
.cell{min-height:76px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);
  padding:4px 3px;cursor:pointer;transition:.1s;overflow:hidden}
.cell:nth-child(7n){border-right:none}
.cell:hover{background:#fcfbf8}
.cell.other{background:#f7f6f2;opacity:.5}
.cell.today{background:var(--gold-bg)}
.daynum{font-size:11px;color:var(--ink2);font-weight:500}
.cell.today .daynum{color:var(--gold);font-weight:700}
.daynum.sun{color:#c0392b}.daynum.sat{color:#2471a3}
.ev{font-size:9.5px;line-height:1.3;margin-top:2px;padding:1px 3px;border-radius:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev.done{opacity:.45;text-decoration:line-through}
.ev.미팅{background:var(--blue-bg);color:var(--blue)}
.ev.견적{background:var(--gold-bg);color:var(--gold)}
.ev.실측{background:var(--purple-bg);color:var(--purple)}
.ev.공사{background:var(--coral-bg);color:var(--coral)}
.ev.기타{background:var(--gray-bg);color:var(--ink2)}
.ev-more{font-size:9px;color:var(--ink3);padding:1px 3px;margin-top:1px}

/* today cards */
.tcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
  margin-bottom:10px;display:flex;gap:13px;transition:.1s}
.tcard.done{opacity:.55}
.tcard .ttime{font-size:17px;font-weight:700;color:var(--ink);min-width:58px;padding-top:2px}
.tcard .ttime.none{font-size:14px;font-weight:500;color:var(--ink3)}
.tcard .tbody{flex:1;min-width:0}
.tcard .tsite{font-size:16px;font-weight:600}
.tcard.done .tsite{text-decoration:line-through}
.tcard .tdesc{font-size:14px;color:var(--ink2);margin-top:2px}
.tcard .tmemo{font-size:13px;color:var(--ink3);margin-top:5px;line-height:1.5;
  background:var(--gray-bg);padding:7px 10px;border-radius:7px}
.tcard .ttags{margin-top:8px;display:flex;align-items:center;gap:7px}
.tcheck{border:1px solid var(--line2);background:transparent;border-radius:8px;
  padding:7px 13px;font-size:13px;cursor:pointer;font-weight:500;color:var(--ink2);white-space:nowrap}
.tcheck.is-done{border-color:var(--teal);color:var(--teal);background:var(--teal-bg)}
.tcheck:hover{border-color:var(--teal)}

/* shared list row (week list fallback / day list) */
.daygroup{margin-top:14px}
.dayhead{font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:6px}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px}
.tag.미팅{background:var(--blue-bg);color:var(--blue)}
.tag.견적{background:var(--gold-bg);color:var(--gold)}
.tag.실측{background:var(--purple-bg);color:var(--purple)}
.tag.공사{background:var(--coral-bg);color:var(--coral)}
.tag.기타{background:var(--gray-bg);color:var(--ink2)}
.empty{text-align:center;color:var(--ink3);font-size:14px;padding:34px 0}

/* customer */
.search{width:100%;border:1px solid var(--line2);border-radius:10px;padding:11px 14px;
  font-size:15px;background:var(--card);margin:8px 0 14px;font-family:inherit;color:var(--ink)}
.search:focus{outline:none;border-color:var(--gold)}
.cust{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden}
.cust-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px;user-select:none}
.cust-header:active{background:var(--bg2)}
.cust-info{min-width:0;flex:1}
.cust-name{font-size:15px;font-weight:600}
.cust-sub{font-size:12px;color:var(--ink3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cust-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
.site-move{background:none;border:none;padding:3px 6px;font-size:11px;color:var(--ink3);cursor:pointer;border-radius:4px;line-height:1}
.site-move:hover:not(:disabled){color:var(--gold);background:var(--gold-bg)}
.site-move:disabled{opacity:0.2;cursor:default}
.site-hide{background:none;border:none;padding:3px 6px;font-size:13px;color:var(--ink3);cursor:pointer;border-radius:4px;line-height:1;opacity:0.4}
.site-hide:hover{opacity:1;background:#fee}
.cust-chevron{font-size:11px;color:var(--ink3);margin-left:4px;display:inline-block;transition:transform .2s}
.cust.open .cust-chevron{transform:rotate(180deg)}
.cust-body{border-top:1px solid var(--line);display:none;padding:0 0 10px}
.cust-body.open{display:block}
.site-note{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 12px;
  font-size:13px;resize:vertical;font-family:inherit;color:var(--ink);background:var(--bg);
  min-height:64px;line-height:1.6;display:block}
.site-note:focus{outline:none;border-color:var(--gold);background:#fff}
.site-note-wrap{padding:10px 14px 4px}
.cust-ev-label{font-size:12px;color:var(--ink3);padding:8px 14px 2px;font-weight:500}
.memo{font-size:13px;color:var(--ink2);line-height:1.6;padding:8px 0}
.memo .ml{display:block;padding-left:12px;position:relative}
.memo .ml:before{content:"·";position:absolute;left:2px;color:var(--gold)}
.mini-ev{font-size:12.5px;padding:6px 14px;border-top:1px solid var(--line);display:flex;gap:8px;cursor:pointer}
.mini-ev .md{color:var(--ink3);min-width:96px}

/* FAB */
.fab{position:fixed;right:18px;bottom:22px;width:58px;height:58px;border-radius:50%;
  background:var(--black);color:var(--gold);border:none;font-size:30px;cursor:pointer;z-index:40;
  box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;line-height:1}
.fab:active{transform:scale(.94)}

/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.sheet{background:var(--bg);width:100%;max-width:520px;border-radius:18px 18px 0 0;
  padding:18px 18px 26px;max-height:92vh;overflow-y:auto;animation:up .2s ease}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
@media(min-width:560px){.ov{align-items:center}.sheet{border-radius:18px}}
.sheet h2{font-size:16px;font-weight:600;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--ink2);margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line2);border-radius:9px;
  padding:11px;font-size:15px;background:var(--card);font-family:inherit;color:var(--ink)}
.field textarea{min-height:58px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
.two{display:flex;gap:10px}.two>*{flex:1}
.chips{display:flex;gap:6px}
.chip{flex:1;text-align:center;padding:10px 4px;border:1px solid var(--line2);border-radius:9px;
  font-size:13px;font-weight:500;cursor:pointer;background:var(--card);color:var(--ink2)}
.chip.on{background:var(--black);color:#fff;border-color:var(--black)}
.acts{display:flex;gap:10px;margin-top:18px}
.acts .btn{flex:1;padding:13px;font-size:15px;text-align:center}
.acts .save{background:var(--black);color:#fff;border-color:var(--black)}
.acts .del{color:#c0392b;border-color:#e0b4ae;flex:0 0 auto;padding:13px 16px}
.hint{font-size:11.5px;color:var(--ink3);text-align:center;margin:6px 0 0;line-height:1.5}
/* 현장명 자동완성 */
.site-ac-wrap{position:relative}
.site-ac-list{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--line2);
  border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:200;max-height:200px;overflow-y:auto;margin-top:3px;display:none}
.site-ac-list.open{display:block}
.site-ac-item{padding:11px 14px;font-size:15px;cursor:pointer;border-bottom:1px solid var(--line)}
.site-ac-item:last-child{border-bottom:none}
.site-ac-item:active,.site-ac-item:hover{background:var(--bg)}

/* detail view modal */
.dv-kind{display:inline-block;font-size:12px;font-weight:600;padding:3px 10px;border-radius:6px;margin-bottom:8px}
.dv-kind.미팅{background:var(--blue-bg);color:var(--blue)}
.dv-kind.견적{background:var(--gold-bg);color:var(--gold)}
.dv-kind.실측{background:var(--purple-bg);color:var(--purple)}
.dv-kind.공사{background:var(--coral-bg);color:var(--coral)}
.dv-kind.기타{background:var(--gray-bg);color:var(--ink2)}
.dv-when{font-size:14px;color:var(--gold);font-weight:600;margin-bottom:14px}
.dv-row{display:flex;gap:12px;padding:11px 0;border-top:1px solid var(--line);font-size:14px}
.dv-l{color:var(--ink3);min-width:46px;flex-shrink:0;font-size:13px}
.dv-v{color:var(--ink);flex:1;line-height:1.55;white-space:pre-wrap}
.dv-v.done{color:var(--teal);font-weight:600}

/* day list */
.dl-row{display:flex;gap:11px;align-items:flex-start;padding:12px 0;border-top:1px solid var(--line);cursor:pointer}
.dl-row:first-child{border-top:none}
.dl-row:hover{opacity:.7}
.dl-time{font-size:14px;font-weight:600;min-width:48px;color:var(--ink)}
.dl-time.none{color:var(--ink3);font-weight:400}
.dl-body{flex:1;min-width:0}
.dl-site{font-size:15px;font-weight:600}
.dl-desc{font-size:13px;color:var(--ink2);margin-top:1px}
.dl-row.done .dl-site{text-decoration:line-through;opacity:.55}

/* todo */
.paste-box{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:8px 0 14px;overflow:hidden}
.paste-h{padding:12px 15px;font-size:14px;font-weight:600;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:7px}
.paste-h:hover{background:#fcfbf8}
.paste-body{display:none;padding:0 15px 14px}
.paste-body.open{display:block}
.paste-body textarea{width:100%;min-height:130px;border:1px solid var(--line2);border-radius:9px;
  padding:11px;font-size:14px;font-family:inherit;line-height:1.6;resize:vertical;color:var(--ink);background:var(--bg)}
.paste-btns{display:flex;gap:9px;margin-top:10px}
.paste-btns .btn{flex:1;padding:11px;text-align:center}
.paste-btns .go{background:var(--black);color:#fff;border-color:var(--black)}
.preview{background:var(--gold-bg);border:1px solid #ecd9b3;border-radius:10px;padding:12px 14px;margin-top:12px}
.preview-h{font-size:12.5px;font-weight:600;color:var(--gold);margin-bottom:8px}
.pv-item{font-size:13.5px;padding:4px 0;color:var(--ink2)}
.pv-item .pv-sub{display:block;padding-left:14px;color:var(--ink3);font-size:12.5px}

.todo-sec{font-size:12px;color:var(--ink3);font-weight:600;margin:16px 0 6px;padding-left:2px}
.todo-item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;
  margin-bottom:7px;display:flex;gap:11px;align-items:flex-start;cursor:pointer;transition:.1s}
.todo-item:hover{border-color:var(--line2)}
.todo-check{width:21px;height:21px;border:2px solid var(--line2);border-radius:6px;flex-shrink:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;margin-top:1px}
.todo-item.done .todo-check{background:var(--teal);border-color:var(--teal)}
.todo-body{flex:1;min-width:0}
.todo-text{font-size:14.5px;font-weight:500}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--ink3);font-weight:400}
.todo-sub{font-size:13px;color:var(--ink3);margin-top:2px;padding-left:0}
.todo-sub .ts{display:block;padding-left:12px;position:relative}
.todo-sub .ts:before{content:"›";position:absolute;left:0;color:var(--gold)}
.todo-tags{margin-top:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.todo-site{font-size:11.5px;color:var(--ink3);background:var(--gray-bg);padding:2px 8px;border-radius:5px}
.todo-date-btn{font-size:11.5px;color:var(--gold);border:1px solid #e6d3a0;background:transparent;
  border-radius:5px;padding:2px 9px;cursor:pointer;font-weight:500}
.todo-date-btn:hover{background:var(--gold-bg)}
.todo-promoted{font-size:11.5px;color:var(--teal);background:var(--teal-bg);padding:2px 8px;border-radius:5px}
.todo-del{background:none;border:none;color:var(--ink3);font-size:14px;padding:4px 6px;cursor:pointer;flex-shrink:0;line-height:1;border-radius:6px}
.todo-del:active{background:#fee;color:#c0392b}

/* ===== 작업자(인건비) 탭 ===== */
/* 공사 구분 색상 */
.wk-전기{background:#fff3d6;color:#9a6b00}
.wk-목공{background:#efe3d2;color:#7a5a30}
.wk-도장{background:#e3eefb;color:#1f5fa8}
.wk-철거{background:#fbe2db;color:#a33d22}

/* 보기 토글 */
.vtoggle{display:flex;gap:4px;background:var(--gray-bg);border-radius:9px;padding:3px}
.vtoggle button{flex:1;border:none;background:transparent;padding:7px 8px;font-size:13px;
  font-weight:600;color:var(--ink2);border-radius:7px;cursor:pointer;white-space:nowrap}
.vtoggle button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* 월 합계 바 */
.sum-bar{display:flex;gap:8px;margin:10px 0 12px}
.sum-card{flex:1;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;text-align:center}
.sum-card .sl{font-size:11px;color:var(--ink3);font-weight:500;margin-bottom:3px}
.sum-card .sv{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.sum-card.paid .sv{color:var(--teal)}
.sum-card.unpaid .sv{color:var(--coral)}

/* 작업자 리스트 */
.wk-day{font-size:12.5px;font-weight:700;color:var(--ink2);margin:16px 0 6px;padding-left:2px;
  display:flex;align-items:center;gap:7px}
.wk-day .wk-day-sum{font-size:11.5px;color:var(--ink3);font-weight:500;margin-left:auto}
.wk-row{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;
  margin-bottom:7px;display:flex;gap:11px;align-items:center;cursor:pointer;transition:.1s}
.wk-row:hover{border-color:var(--line2)}
.wk-row.paid{opacity:.62}
.wk-row .wk-main{flex:1;min-width:0}
.wk-row .wk-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.wk-row .wk-meta{font-size:12.5px;color:var(--ink3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wk-row .wk-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.wk-row .wk-pay{font-size:15px;font-weight:700;color:var(--ink)}
.wk-paybtn{border:1px solid var(--line2);background:transparent;color:var(--ink2);
  border-radius:7px;padding:4px 10px;font-size:11.5px;cursor:pointer;font-weight:600;white-space:nowrap}
.wk-paybtn.is-paid{border-color:var(--teal);color:var(--teal);background:var(--teal-bg)}
.wk-grouphint{font-size:11.5px;color:var(--ink3);text-align:center;margin:2px 0 0}

      <button class="tab" data-v="month">월간</button>
      <button class="tab" data-v="cust">현장</button>
      <button class="tab" data-v="worker">작업자</button>

</div>

<div class="ov" id="dayov">

  </div>
</div>

<div class="ov" id="dov">

let syncState="";  // "", "loading", "saving", "ok", "error"
function setSync(s){syncState=s;const el=document.getElementById("syncBadge");if(el)el.textContent=syncLabel();}
function syncLabel(){return syncState==="loading"?"불러오는 중…":syncState==="saving"?"저장 중…":syncState==="ok"?"동기화됨":syncState==="error"?"동기화 실패(로컬 저장됨)":"";}

// 시트 날짜/시간 → 로컬 변환 (getHours/getDate 사용: 브라우저 로컬타임 = KST)
function normDate(v){
  if(!v)return"";
  if(typeof v==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(v))return v;
  const d=new Date(v);if(isNaN(d))return"";
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function normTime(v){
  if(!v)return"";
  if(typeof v==="string"&&/^\d{1,2}:\d{2}/.test(v))return v.slice(0,5);
  const d=new Date(v);if(isNaN(d))return typeof v==="string"?v:"";
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
// 시트행(한글키) → 앱객체(영문키)
function rowToEvent(r){
  return {id:Number(r["일정ID"])||Date.now()+Math.random(),date:normDate(r["날짜"]),time:normTime(r["시간"]),
    site:String(r["현장명"]||""),desc:String(r["내용"]||""),kind:String(r["구분"]||"기타"),
    status:String(r["상태"]||"예정"),memo:String(r["메모"]||""),week:normDate(r["주간"])||null};
}
function eventToRow(e){
  return {"일정ID":e.id,"날짜":e.date||"","시간":e.time||"","현장명":e.site||"","내용":e.desc||"",
    "구분":e.kind||"기타","상태":e.status||"예정","메모":e.memo||"","주간":e.week||""};
}
function rowToSite(r){
  return {name:String(r["현장명"]||""),customer:String(r["고객명"]||""),
    note:String(r["노트"]||""),hidden:String(r["숨김"]||"").toLowerCase()==="true"};
}
function siteToRow(name,info){
  return {"현장명":name,"고객명":info.customer||"","노트":info.note||"","숨김":info.hidden?"true":""};
}
function rowToTodo(r){
  const subRaw=String(r["하위메모"]||"");
  const sub=subRaw?subRaw.split("|").filter(Boolean):[];
  return {id:Number(r["할일ID"])||Date.now()+Math.random(),
    text:String(r["내용"]||""),site:String(r["현장"]||""),sub:sub,
    desc:String(r["상세"]||""),memo:String(r["메모"]||""),
    kind:String(r["구분"]||"기타"),done:String(r["완료"]||"").toLowerCase()==="true",
    promoted:String(r["승격여부"]||"").toLowerCase()==="true"};
}
function todoToRow(t){
  return {"할일ID":t.id,"내용":t.text||"","현장":t.site||"",
    "하위메모":(t.sub||[]).join("|"),"상세":t.desc||"","메모":t.memo||"","구분":t.kind||"기타",
    "완료":t.done?"true":"false","승격여부":t.promoted?"true":"false"};
}
// 작업자 시트 ↔ 앱
function rowToWorker(r){
  let pay=r["일당"];
  if(typeof pay==="string")pay=Number(pay.replace(/[^\d.-]/g,""))||0;
  else pay=Number(pay)||0;
  return {id:Number(r["작업ID"])||Date.now()+Math.random(),date:normDate(r["날짜"]),time:normTime(r["시간"]),
    worker:String(r["작업자"]||""),site:String(r["현장"]||""),kind:String(r["구분"]||"기타"),
    pay:pay,paid:String(r["지급여부"]||"미지급"),memo:String(r["메모"]||"")};
}
function workerToRow(w){
  return {"작업ID":w.id,"날짜":w.date||"","시간":w.time||"","작업자":w.worker||"","현장":w.site||"",
    "구분":w.kind||"기타","일당":w.pay||0,"지급여부":w.paid||"미지급","메모":w.memo||""};
}

async function syncFromSheet(){
  setSync("loading");
  try{
    const res=await fetch(SHEET_API);
    const j=await res.json();
    if(j.일정){DATA=j.일정.map(rowToEvent);localStorage.setItem(STORE,JSON.stringify(DATA));}
    if(Array.isArray(j.현장)){
      // 시트 데이터로 완전히 교체 (기존 키 전부 삭제 후 재구성)
      Object.keys(SITE_INFO).forEach(k=>delete SITE_INFO[k]);
      j.현장.forEach(r=>{
        const s=rowToSite(r);if(!s.name)return;
        SITE_INFO[s.name]={customer:s.customer,note:s.note||"",hidden:s.hidden||false};
      });
      // SITE_ORDER도 시트에 없는 현장은 제거
      const savedOrder=loadSiteOrder();
      if(savedOrder){
        const validNames=new Set(Object.keys(SITE_INFO));
        const filtered=savedOrder.filter(n=>validNames.has(n));
        saveSiteOrder(filtered);
      }
    }
    if(j.할일){TODOS=j.할일.map(rowToTodo);localStorage.setItem(TODO_STORE,JSON.stringify(TODOS));}
    if(j.작업자){WORKERS=j.작업자.map(rowToWorker);localStorage.setItem(WORKER_STORE,JSON.stringify(WORKERS));}
    setSync("ok");render();
  }catch(err){setSync("error");}
}

let pushTimer=null;
function pushToSheet(){
  if(pushTimer)clearTimeout(pushTimer);
  pushTimer=setTimeout(async()=>{
    setSync("saving");
    try{
      await fetch(SHEET_API,{method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify({sheet:"일정",action:"replaceAll",rows:DATA.map(eventToRow)})});
      setSync("ok");
    }catch(err){setSync("error");}
  },800);
}

function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function todayStr(){return fmt(new Date());}
function byTime(a,b){const ta=a.time||"99:99",tb=b.time||"99:99";return ta<tb?-1:ta>tb?1:0;}
function evOf(ds){return DATA.filter(e=>e.date===ds).sort(byTime);}
function weekStart(d){const s=new Date(d);s.setDate(d.getDate()-d.getDay());s.setHours(0,0,0,0);return s;} // 일요일 시작

/* ===== 2주 보드 ===== */
function wkKey(d){return fmt(weekStart(d));} // 그 주 일요일 날짜 = 주 식별자
function weekMemos(monKey){return DATA.filter(e=>!e.date&&e.week===monKey);}
function renderBoard(){
  const base=weekStart(cur);
  let html=`<div class="nav">
    <button class="addbar" id="addTop">+ 새 일정 추가</button>
    <div class="arrows">
      <button class="btn today" data-go="today">이번 주</button>
      <button class="btn" data-go="prev">‹ 이전</button>
      <button class="btn" data-go="next">다음 ›</button>
    </div></div>`;
  html+=`<div class="scrollhint">← 좌우로 넘겨서 보세요 →</div>`;
  html+=`<div class="board-area">`;
  for(let w=0;w<2;w++){
    const ws=new Date(base);ws.setDate(base.getDate()+w*7);
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    const monKey=fmt(ws);
    html+=`<div class="weekband">${w===0?"이번 주":"다음 주"} · ${ws.getMonth()+1}/${ws.getDate()} – ${we.getMonth()+1}/${we.getDate()}</div>`;
    html+=`<div class="board-wrap"${w===0?' data-thisweek="1"':''}><div class="board">`;
    for(let i=0;i<7;i++){
      const d=new Date(ws);d.setDate(ws.getDate()+i);const ds=fmt(d);
      const evs=evOf(ds);const isT=ds===todayStr();const wknd=d.getDay()===0||d.getDay()===6;
      let inner=`<div class="bhead"><span class="bd">${d.getDate()}</span>${DOW[d.getDay()]}</div>`;
      evs.slice(0,4).forEach(e=>{
        const t=e.time?`<span class="bt">${e.time}</span>`:"";
        const dn=e.status==="완료"?"done":"";
        inner+=`<div class="bev ${e.kind} ${dn}" data-id="${e.id}">${t}<span class="bn">${e.site}</span></div>`;
      });
      if(evs.length>4)inner+=`<div class="bmore" data-day="${ds}">+${evs.length-4}개 더 보기</div>`;
      html+=`<div class="bcell ${isT?'today':''} ${wknd?'weekend':''}" data-date="${ds}">${inner}</div>`;
    }
    html+=`</div></div>`;
    // 주간 메모 (날짜 미정) - 스크롤 영역 밖, 항상 고정 표시
    const wm=weekMemos(monKey);
    html+=`<div class="wmemo"><div class="wmemo-h">📌 ${w===0?"이번 주":"다음 주"} 메모 · 날짜 미정 할 일</div>`;
    if(wm.length){
      html+=`<div class="wmemo-scroll"><div class="wmemo-list">`;
      wm.forEach(e=>{
        const dn=e.status==="완료"?"done":"";
        html+=`<div class="wmemo-item ${dn}">
          <button class="wmemo-btn" data-wdate="${e.id}" title="날짜 잡기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg></button>
          <button class="wmemo-btn" data-wtodo="${e.id}" title="할일로 보내기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></button>
          <span class="tag ${e.kind} wtag">${e.kind}</span>
          <span class="wmemo-text">${e.site}${e.desc?" · "+e.desc:""}</span>
        </div>`;
      });
      html+=`</div></div>`;
    }else{
      html+=`<div class="wmemo-empty">아직 없음</div>`;
    }
    html+=`<div class="wmemo-add" data-week="${monKey}">+ 메모 추가</div></div>`;
  }
  html+=`</div>`;
  html+=attentionHTML();
  V.innerHTML=html;
  // 오늘 요일이 화면 맨 앞에 오도록 이번 주 보드만 가로 스크롤
  requestAnimationFrame(()=>{
    const wrap=V.querySelector('.board-wrap[data-thisweek="1"]');
    const todayCell=wrap&&wrap.querySelector(".bcell.today");
    if(wrap&&todayCell){
      const board=todayCell.closest(".board");
      const left=todayCell.offsetLeft-board.offsetLeft-8;
      wrap.scrollTo({left:Math.max(0,left),behavior:"auto"});
    }
  });
}

/* ===== 확인 필요한 일정 (접힌 바, 맨 아래) ===== */
function overdue(){
  const t=todayStr();
  return DATA.filter(e=>e.date&&e.status!=="완료"&&e.date<t).sort((a,b)=>a.date<b.date?-1:1);
}
function attentionHTML(){
  const od=overdue();
  if(!od.length)return"";
  let rows="";
  od.forEach(e=>{
    rows+=`<div class="attn-row">
      <span class="attn-date">${e.date.slice(5)}</span>
      <span class="attn-body">${e.site}${e.desc?" · "+e.desc:""} <span class="tag ${e.kind}">${e.kind}</span></span>
      <button class="attn-check" data-done="${e.id}">완료</button></div>`;
  });
  return `<div class="attn-bar">
    <div class="attn-toggle" id="attnToggle">확인 필요한 일정 ${od.length}건 <span style="margin-left:auto">▾</span></div>
    <div class="attn-list" id="attnList">${rows}</div></div>`;
}

/* ===== 오늘 상세 (카드형) ===== */
function renderToday(){
  const d=new Date(),ds=todayStr();
  const evs=evOf(ds);
  let html=`<div class="nav"><div class="range">오늘 · ${d.getMonth()+1}/${d.getDate()} (${DOW[d.getDay()]})</div>
    <button class="addbar" id="addTop">+ 일정 추가</button></div>`;
  if(!evs.length)html+=`<div class="empty">오늘 일정이 없습니다</div>`;
  evs.forEach(e=>html+=todayCard(e));
  // 내일
  const t=new Date(d);t.setDate(d.getDate()+1);const tds=fmt(t);
  const tev=evOf(tds);
  if(tev.length){
    html+=`<div class="daygroup"><div class="dayhead">내일 · ${t.getMonth()+1}/${t.getDate()} (${DOW[t.getDay()]})</div></div>`;
    tev.forEach(e=>html+=todayCard(e));
  }
  html+=attentionHTML();
  V.innerHTML=html;
}
function todayCard(e){
  const done=e.status==="완료";
  const time=e.time?`<div class="ttime">${e.time}</div>`:`<div class="ttime none">종일</div>`;
  return `<div class="tcard ${done?'done':''}">${time}
    <div class="tbody" data-id="${e.id}" style="cursor:pointer">
      <div class="tsite">${e.site||"(제목없음)"}</div>
      ${e.desc?`<div class="tdesc">${e.desc}</div>`:""}
      ${e.memo?`<div class="tmemo">메모: ${e.memo}</div>`:""}
      <div class="ttags"><span class="tag ${e.kind}">${e.kind}</span></div>
    </div>
    <button class="tcheck ${done?'is-done':''}" data-done="${e.id}">${done?"✓ 완료":"완료"}</button>
  </div>`;
}

/* ===== 월간 (전체 표시) ===== */
function renderMonth(){
  const y=cur.getFullYear(),m=cur.getMonth();
  const first=new Date(y,m,1),start=new Date(first);
  start.setDate(1-first.getDay()); // 일요일 시작
  let cells="";
  for(let i=0;i<42;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const ds=fmt(d),other=d.getMonth()!==m,isT=ds===todayStr();
    const evs=evOf(ds);
    let cls="daynum"+(d.getDay()===0?" sun":d.getDay()===6?" sat":"");
    let inner=`<div class="${cls}">${d.getDate()}</div>`;
    const MAX=3;
    evs.slice(0,MAX).forEach(e=>{
      const dn=e.status==="완료"?"done":"";
      inner+=`<div class="ev ${e.kind} ${dn}" data-id="${e.id}">${e.site}</div>`;
    });
    if(evs.length>MAX)inner+=`<div class="ev-more" data-date="${ds}">+${evs.length-MAX}개</div>`;
    cells+=`<div class="cell ${other?'other':''} ${isT?'today':''}" data-date="${ds}">${inner}</div>`;
  }
  V.innerHTML=`<div class="nav"><div class="range">${y}년 ${m+1}월</div>
    <div class="arrows"><button class="btn today" data-go="today">오늘</button>
    <button class="btn" data-go="prev">‹</button><button class="btn" data-go="next">›</button></div></div>
    <div class="cal" id="monthCal"><div class="dow"><div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="sat">토</div></div>
    <div class="grid">${cells}</div></div>`;
  // 터치 스와이프로 월 이동
  const cal=document.getElementById("monthCal");
  let _tx=0,_ty=0;
  cal.addEventListener("touchstart",e=>{_tx=e.touches[0].clientX;_ty=e.touches[0].clientY;},{passive:true});
  cal.addEventListener("touchend",e=>{
    const dx=e.changedTouches[0].clientX-_tx;
    const dy=e.changedTouches[0].clientY-_ty;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>55){
      cur.setMonth(cur.getMonth()+(dx<0?1:-1));render();
    }
  });
}

/* ===== 작업자(인건비) ===== */
function wkOf(ds){return WORKERS.filter(w=>w.date===ds).sort(byTime);}
function fmtWon(n){n=Number(n)||0;return n.toLocaleString("ko-KR");}
function renderWorker(){
  const y=cur.getFullYear(),m=cur.getMonth();
  // 월 합계 (현재 보고 있는 달 기준)
  const mPrefix=y+"-"+String(m+1).padStart(2,"0");
  const monthRows=WORKERS.filter(w=>w.date&&w.date.startsWith(mPrefix));
  let total=0,paid=0;const days=new Set();
  monthRows.forEach(w=>{const p=Number(w.pay)||0;total+=p;if(w.paid==="지급완료")paid+=p;if(w.date)days.add(w.date);});
  const unpaid=total-paid;

  let html=`<div class="nav"><div class="range">${y}년 ${m+1}월</div>
    <div class="arrows"><button class="btn today" data-go="today">오늘</button>

/* ===== 현장별 ===== */
const STAGES=["상담","견적","계약","시공","완료"];
function kindToStage(k){return k==="견적"?1:k==="실측"?2:k==="공사"?3:0;}
function inferStage(evs){
  if(!evs.length)return 0;
  if(evs.every(e=>e.status==="완료"))return 4;
  const latest=[...evs].sort((a,b)=>a.date<b.date?1:-1)[0];
  return kindToStage(latest.kind);
}
function progressHTML(stage){
  const fill=stage===0?0:(stage/(STAGES.length-1))*86;
  let steps="";
  STAGES.forEach((s,i)=>{
    const cls=i<stage?"done":i===stage?"now":"";
    steps+=`<div class="pstep ${cls}"><div class="pdot"></div><div class="plabel">${s}</div></div>`;
  });
  return `<div class="prog"><div class="prog-track"><div class="pline"></div>
    <div class="pline-fill" style="width:${fill}%"></div>${steps}</div></div>`;
}
function findInfo(name){
  if(SITE_INFO[name])return SITE_INFO[name];
  for(const k in SITE_INFO){if(name.includes(k)||k.includes(name))return SITE_INFO[k];}
  return null;
}
const SITE_ORDER_KEY="smh_site_order";
function loadSiteOrder(){try{const s=localStorage.getItem(SITE_ORDER_KEY);if(s)return JSON.parse(s);}catch(e){}return null;}
function saveSiteOrder(order){localStorage.setItem(SITE_ORDER_KEY,JSON.stringify(order));}
function moveSite(name,dir){
  const normToCanon2={};
  Object.keys(SITE_INFO).forEach(n=>{normToCanon2[normSite(n)]=n;});
  DATA.forEach(e=>{if(!e.date)return;const norm=normSite(e.site||"기타");if(!normToCanon2[norm])normToCanon2[norm]=e.site||"기타";});
  const allNames=Object.values(normToCanon2);
  let order=loadSiteOrder()||[...allNames].sort();
  allNames.forEach(n=>{if(!order.includes(n))order.push(n);});
  order=order.filter(n=>allNames.includes(n));
  const idx=order.indexOf(name);
  if(idx<0)return;
  if(dir==="up"&&idx>0){[order[idx-1],order[idx]]=[order[idx],order[idx-1]];}
  else if(dir==="down"&&idx<order.length-1){[order[idx],order[idx+1]]=[order[idx+1],order[idx]];}
  saveSiteOrder(order);
  renderCust();
}
function normSite(n){return n.replace(/\s+/g,"");}  // 공백 제거로 동일 현장 판별
function renderCust(){
  // 공백 무시 기준으로 현장 병합 (norm → canonical name, events[])
  const normToCanon={};
  const normToEvs={};
  // SITE_INFO 이름을 canonical로 우선 등록
  Object.keys(SITE_INFO).forEach(name=>{
    const norm=normSite(name);
    normToCanon[norm]=name;
    normToEvs[norm]=normToEvs[norm]||[];
  });
  // 일정에서 현장명 수집 (SITE_INFO에 없으면 첫 등장 이름을 canonical로)
  DATA.forEach(e=>{
    if(!e.date)return;
    const name=e.site||"기타";
    const norm=normSite(name);
    if(!normToCanon[norm])normToCanon[norm]=name;
    (normToEvs[norm]=normToEvs[norm]||[]).push(e);
  });
  const allNames=Object.values(normToCanon);
  let order=loadSiteOrder()||[...allNames].sort();
  allNames.forEach(n=>{if(!order.includes(n))order.push(n);});
  order=order.filter(n=>allNames.includes(n));
  const q=custQuery.trim().toLowerCase();
  const visible=q?order:order.filter(name=>!SITE_INFO[name]?.hidden);
  const filtered=q?visible.filter(name=>{
    const norm=normSite(name);
    const evs=normToEvs[norm]||[];const info=SITE_INFO[name]||findInfo(name);
    return [name,info?.customer,info?.note,...evs.map(e=>e.desc+" "+e.memo)].join(" ").toLowerCase().includes(q);
  }):visible;
  let html=`<input class="search" id="custSearch" placeholder="현장명, 고객명, 메모 검색" value="${custQuery}">`;
  filtered.forEach((name,idx)=>{
    const norm=normSite(name);
    const evs=(normToEvs[norm]||[]).sort((a,b)=>a.date<b.date?-1:1);
    const info=SITE_INFO[name]||findInfo(name);
    const meta=info?.customer||"";
    const recent=evs.length?(()=>{const le=evs[evs.length-1];const dw=DOW[new Date(le.date+"T00:00").getDay()];return le.date.slice(5)+"("+dw+") "+(le.desc||le.kind);})():"일정 없음";
    const noteVal=(info?.note||"").replace(/"/g,"&quot;").replace(/</g,"&lt;");
    const ss=name.replace(/"/g,"&quot;");
    const first=idx===0,last=idx===filtered.length-1;
    html+=`<div class="cust" id="cust-${cssid(name)}">
      <div class="cust-header" data-cust="${ss}">
        <div class="cust-info">
          <div class="cust-name">${name}${info?.hidden?` <span style="font-size:11px;color:var(--ink3);font-weight:400">(숨김)</span>`:"" }</div>
          <div class="cust-sub">${meta?meta+" · ":""}최근: ${recent}</div>
        </div>
        <div class="cust-actions">
          <button class="site-move" data-dir="up" data-site="${ss}"${first?" disabled":""}>▲</button>
          <button class="site-move" data-dir="down" data-site="${ss}"${last?" disabled":""}>▼</button>
          <button class="site-hide" data-site="${ss}" title="숨기기">🗑</button>
          <span class="cust-chevron">▾</span>
        </div>
      </div>
      <div class="cust-body" id="cb-${cssid(name)}">
        <div class="site-note-wrap"><textarea class="site-note" data-site="${ss}" oninput="saveNote(this)" placeholder="현장 노트 (자유 기재 / 자동저장)">${noteVal}</textarea></div>`;
    if(evs.length){
      html+=`<div class="cust-ev-label">관련 일정</div>`;
      evs.forEach(e=>{const t=e.time||"종일";
        const dw=DOW[new Date(e.date+"T00:00").getDay()];
        html+=`<div class="mini-ev" data-id="${e.id}"><span class="md">${e.date.slice(5)}(${dw}) ${t}</span>
          <span>${e.desc||""} <span class="tag ${e.kind}">${e.kind}</span>${e.memo?`<span style="color:var(--ink3);font-size:12px;margin-left:4px">· ${e.memo}</span>`:""}</span></div>`;});
    }
    html+=`</div></div>`;
  });
  if(!filtered.length)html+=`<div class="empty">검색 결과가 없습니다</div>`;
  V.innerHTML=html;
  const si=document.getElementById("custSearch");
  if(si){
    let composing=false;
    si.addEventListener("compositionstart",()=>{composing=true;});
    si.addEventListener("compositionend",ev=>{composing=false;custQuery=ev.target.value;
      const pos=si.selectionStart;renderCust();
      const n=document.getElementById("custSearch");if(n){n.focus();n.setSelectionRange(pos,pos);}});
    si.addEventListener("input",ev=>{if(composing)return;
      custQuery=ev.target.value;const pos=si.selectionStart;renderCust();
      const n=document.getElementById("custSearch");if(n){n.focus();n.setSelectionRange(pos,pos);}});
  }
}
function cssid(s){return s.replace(/[^a-zA-Z0-9가-힣]/g,"_");}

/* ===== 할 일 ===== */
const KIND_KEYWORDS=[["실측",["실측","측정"]],["견적",["견적","견적서"]],["공사",["공사","시공","보수","철거","제작"]],["미팅",["미팅","상담","방문","연락","전달"]]];
function guessKind(text){
  for(const[k,ws]of KIND_KEYWORDS)for(const w of ws)if(text.includes(w))return k;
  return "기타";
}
function guessSite(text){
  // 줄 첫 토큰을 현장명 후보로. 흔한 동사/접미어 제거
  let t=text.replace(/\[.*?\]/g,"").trim();
  const first=t.split(/[\s/]/)[0]||"";
  return first.length>=2?first:"";
}

let pastePreview=null;

function todoItemHTML(t){
  const dn=t.done?"done":"";
  let sub="";
  if(t.sub&&t.sub.length)sub=`<div class="todo-sub">${t.sub.map(s=>`<span class="ts">${s}</span>`).join("")}</div>`;
  let tags=`<div class="todo-tags">`;
  tags+=`<span class="tag ${t.kind}">${t.kind}</span>`;
  if(t.site)tags+=`<span class="todo-site">${t.site}</span>`;
  if(t.promoted)tags+=`<span class="todo-promoted">일정으로 옮김</span>`;
  else if(!t.done){
    tags+=`<button class="todo-date-btn" data-todoschedule="${t.id}">+ 날짜 잡기</button>`;
    tags+=`<button class="todo-date-btn" data-toweek="${t.id}" style="color:var(--ink2)">📌 이번 주 메모로</button>`;
  }
  tags+=`</div>`;
  return `<div class="todo-item ${dn}" data-todoid="${t.id}">
    <div class="todo-check" data-todocheck="${t.id}">${t.done?"✓":""}</div>
    <div class="todo-body"><div class="todo-text">${t.text||t.site}</div>${sub}${tags}</div>
    <button class="todo-del" data-tdel="${t.id}">✕</button></div>`;
}
function parseNote(raw){
  const lines=raw.split("\n");
  const items=[];let last=null;
  lines.forEach(line=>{
    let s=line.trim();
    if(!s||/^[ㅡ\-=_]{3,}$/.test(s))return; // 구분선/빈줄
    // 체크박스 표기 제거
    s=s.replace(/^\[\s*[xX✓]?\s*\]\s*/,"").replace(/^[☐☑✓•]\s*/,"").trim();
    if(!s)return;
    // 하위 항목
    if(/^[>›\-]/.test(s)){
      const sub=s.replace(/^[>›\-]\s*/,"").trim();
      if(last&&sub)last.sub.push(sub);
      return;
    }
    last={text:s,site:guessSite(s),kind:guessKind(s),sub:[]};
    items.push(last);
  });
  return {raw,items};
}

  const titem=e.target.closest("[data-todoid]");
  if(titem){openTodoDetail(Number(titem.dataset.todoid));return;}

  const done=e.target.closest("[data-done]");
  if(done){const id=Number(done.dataset.done);const ev=DATA.find(x=>x.id===id);
    ev.status=ev.status==="완료"?"예정":"완료";save();render();return;}
  const go=e.target.closest("[data-go]");
  if(go){const g=go.dataset.go;
    if(g==="today")cur=new Date();
    else if(view==="month"||view==="worker")cur.setMonth(cur.getMonth()+(g==="next"?1:-1));
    else cur.setDate(cur.getDate()+(g==="next"?14:-14));
    render();return;}
  if(e.target.closest("#addTop")){openModal(null);return;}
  const at=e.target.closest("#attnToggle");
  if(at){const l=document.getElementById("attnList");l.classList.toggle("open");
    at.querySelector("span").textContent=l.classList.contains("open")?"▴":"▾";return;}
  const wadd=e.target.closest(".wmemo-add");
  if(wadd){openModal(null,null,wadd.dataset.week);return;}
  const wdate=e.target.closest("[data-wdate]");
  if(wdate){e.stopPropagation();openModal(Number(wdate.dataset.wdate));return;}
  const wtodo=e.target.closest("[data-wtodo]");
  if(wtodo){e.stopPropagation();
    const id=Number(wtodo.dataset.wtodo);
    const ev=DATA.find(x=>x.id===id);if(!ev)return;
    if(!confirm("할일 탭으로 이동할까요?"))return;
    const t={id:Date.now(),text:ev.desc,site:ev.site,
      kind:ev.kind||"기타",done:false,promoted:false,
      sub:ev.memo?[ev.memo]:[],order:TODOS.length};
    TODOS.push(t);saveTodos();
    DATA=DATA.filter(x=>x.id!==id);save();render();return;
  }
  const mv=e.target.closest(".site-move");
  if(mv){e.stopPropagation();moveSite(mv.dataset.site,mv.dataset.dir);return;}
  const sh=e.target.closest(".site-hide");
  if(sh){e.stopPropagation();
    const name=sh.dataset.site;
    if(!confirm(`"${name}" 현장을 숨길까요?\n앱에서는 안 보이고 시트에서는 확인할 수 있어요.`))return;
    if(!SITE_INFO[name])SITE_INFO[name]={note:""};
    SITE_INFO[name].hidden=true;
    pushSitesToSheet();render();return;
  }
  const ch=e.target.closest(".cust-header");
  if(ch){const name=ch.dataset.cust;const card=document.getElementById("cust-"+cssid(name));
    const b=document.getElementById("cb-"+cssid(name));
    if(!b)return;b.classList.toggle("open");card.classList.toggle("open");return;}
  const dm=e.target.closest(".bmore");
  if(dm&&dm.dataset.day){openDay(dm.dataset.day);return;}
  const em=e.target.closest(".ev-more");
  if(em&&em.dataset.date){openDay(em.dataset.date);return;}
  const cell=e.target.closest(".bcell,.cell");
  if(cell&&cell.dataset.date){
    const inEv=e.target.closest(".bev,.ev");
    if(!inEv){openModal(null,cell.dataset.date);return;}
  }
  const body=e.target.closest("[data-id]");
  if(body){openDetail(Number(body.dataset.id));return;}
});

/* detail view */
const dov=document.getElementById("dov");
const dayov=document.getElementById("dayov");
let detailId=null;
let promoteTodoId=null;
function promoteTodo(id){
  const t=TODOS.find(x=>x.id===id);if(!t)return;
  openModal(null);
  promoteTodoId=id;
  const g=x=>document.getElementById(x);
  g("mTitle").textContent="할 일 → 일정으로 (날짜 잡기)";
  g("fSite").value=t.site||t.text;
  g("fDesc").value=t.desc||(t.site?t.text:"");
  const memoParts=[];
  if(t.memo)memoParts.push(t.memo);
  if(t.sub&&t.sub.length)memoParts.push(t.sub.join(" / "));
  g("fMemo").value=memoParts.join(" / ");
  setKind(t.kind||"미팅");
}
const tov=document.getElementById("tov");
let todoDetailId=null;
function openTodoDetail(id){
  const t=TODOS.find(x=>x.id===id);if(!t)return;
  todoDetailId=id;
  const g=x=>document.getElementById(x);
  const curKind=t.kind||"기타";
  g("tvKindChips").querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",c.dataset.k===curKind));
  g("tvTitle").textContent=t.done?"완료된 할 일":"할 일";
  g("tvText").value=t.text||"";
  g("tvSite").value=t.site||"";
  g("tvDesc").value=t.desc||"";
  g("tvMemo").value=t.memo||"";
  if(t.sub&&t.sub.length){g("tvSubRow").style.display="block";g("tvSub").textContent=t.sub.map(s=>"› "+s).join("\n");}
  else g("tvSubRow").style.display="none";

function closeTodoDetail(){tov.classList.remove("show");}
document.getElementById("tvClose").onclick=closeTodoDetail;
tov.onclick=e=>{if(e.target===tov)closeTodoDetail();};
document.getElementById("tvKindChips").querySelectorAll(".chip").forEach(c=>{
  c.onclick=()=>{document.getElementById("tvKindChips").querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));c.classList.add("on");};
});
document.getElementById("tvSave").onclick=()=>{
  const t=TODOS.find(x=>x.id===todoDetailId);if(!t)return;
  t.text=document.getElementById("tvText").value.trim()||t.text;
  t.site=document.getElementById("tvSite").value.trim();
  t.desc=document.getElementById("tvDesc").value.trim();
  t.memo=document.getElementById("tvMemo").value.trim();
  const onChip=document.getElementById("tvKindChips").querySelector(".chip.on");
  t.kind=onChip?onChip.dataset.k:(t.kind||"기타");
  saveTodos();closeTodoDetail();render();};
document.getElementById("tvDel").onclick=()=>{
  if(!confirm("이 할 일을 삭제할까요?"))return;
  TODOS=TODOS.filter(x=>x.id!==todoDetailId);saveTodos();closeTodoDetail();render();};
document.getElementById("tvSchedule").onclick=()=>{
  const id=todoDetailId;closeTodoDetail();promoteTodo(id);};
function openDay(ds){
  const evs=evOf(ds);
  const d=new Date(ds+"T00:00");
  document.getElementById("dayTitle").textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]}) 일정`;
  let html="";
  evs.forEach(e=>{
    const t=e.time?`<div class="dl-time">${e.time}</div>`:`<div class="dl-time none">종일</div>`;
    const dn=e.status==="완료"?"done":"";
    html+=`<div class="dl-row ${dn}" data-id="${e.id}">${t}
      <div class="dl-body"><div class="dl-site">${e.site}</div>
      ${e.desc?`<div class="dl-desc">${e.desc}</div>`:""}
      <span class="tag ${e.kind}" style="margin-top:5px;display:inline-block">${e.kind}</span></div></div>`;
  });
  document.getElementById("dayList").innerHTML=html;
  dayov.classList.add("show");
}
document.getElementById("dayClose").onclick=()=>dayov.classList.remove("show");
dayov.onclick=e=>{if(e.target===dayov)dayov.classList.remove("show");};
document.getElementById("dayList").addEventListener("click",e=>{
  const wr=e.target.closest("[data-wid]");
  if(wr){dayov.classList.remove("show");openWorkerModal(Number(wr.dataset.wid));return;}
  const r=e.target.closest(".dl-row");if(!r)return;
  dayov.classList.remove("show");openDetail(Number(r.dataset.id));});
function openDetail(id){
  detailId=id;
  const ev=DATA.find(x=>x.id===id);if(!ev)return;
  const g=x=>document.getElementById(x);
  g("dvKind").className="dv-kind "+ev.kind;g("dvKind").textContent=ev.kind;
  g("dvSite").textContent=ev.site||"(제목없음)";
  let when="";
  if(ev.date){const d=new Date(ev.date+"T00:00");
    when=`${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]})`+(ev.time?`  ${ev.time}`:"  종일");
  }else{when="날짜 미정 · 주간 메모";}
  g("dvWhen").textContent=when;
  if(ev.desc){g("dvDescRow").style.display="flex";g("dvDesc").textContent=ev.desc;}
  else g("dvDescRow").style.display="none";
  if(ev.memo){g("dvMemoRow").style.display="flex";g("dvMemo").textContent=ev.memo;}
  else g("dvMemoRow").style.display="none";
  const done=ev.status==="완료";
  g("dvStatus").textContent=done?"완료":"예정";
  g("dvStatus").className="dv-v"+(done?" done":"");
  g("dvDone").textContent=done?"완료 취소":"완료 처리";
  // 주간 메모(날짜 미정)일 때만 날짜 잡기/할일로 보내기 버튼 표시
  const isWeekMemo=!ev.date&&!!ev.week;
  g("dvWeekActs").style.display=isWeekMemo?"flex":"none";
  g("dvStatusRow").style.display=isWeekMemo?"none":"flex";
  dov.classList.add("show");
}
function closeDetail(){dov.classList.remove("show");}
document.getElementById("dvClose").onclick=closeDetail;
dov.onclick=e=>{if(e.target===dov)closeDetail();};
document.getElementById("dvEdit").onclick=()=>{closeDetail();openModal(detailId);};
document.getElementById("dvDone").onclick=()=>{
  const ev=DATA.find(x=>x.id===detailId);
  ev.status=ev.status==="완료"?"예정":"완료";save();closeDetail();render();};
document.getElementById("dvDel").onclick=()=>{
  if(!confirm("이 일정을 삭제할까요?"))return;
  DATA=DATA.filter(x=>x.id!==detailId);save();closeDetail();render();};
document.getElementById("dvSetDate").onclick=()=>{closeDetail();openModal(detailId);};
document.getElementById("dvToTodo").onclick=()=>{
  if(!confirm("할일 탭으로 이동할까요?"))return;
  const ev=DATA.find(x=>x.id===detailId);if(!ev)return;
  const t={id:Date.now(),text:ev.desc,site:ev.site,
    kind:ev.kind||"기타",done:false,promoted:false,
    sub:ev.memo?[ev.memo]:[],order:TODOS.length};
  TODOS.push(t);saveTodos();
  DATA=DATA.filter(x=>x.id!==detailId);save();
  closeDetail();render();
  alert("할일 탭으로 이동했습니다");
};

/* modal */
const ov=document.getElementById("ov");
// 현장명 자동완성
function getSiteNames(){
  const s=new Set();
  Object.keys(SITE_INFO).forEach(n=>s.add(n));
  DATA.forEach(e=>{if(e.site)s.add(e.site);});
  // normSite 기준 중복 제거 (공백 차이 통합)
  const normMap={};
  [...s].forEach(n=>{const norm=normSite(n);if(!normMap[norm])normMap[norm]=n;});
  return Object.values(normMap).sort();
}
function initSiteAc(){
  const inp=document.getElementById("fSite");
  const list=document.getElementById("siteAcList");
  if(!inp||!list)return;
  function showAc(){
    const q=inp.value.replace(/\s+/g,"").toLowerCase();
    const names=getSiteNames();
    const matches=q?names.filter(n=>normSite(n).toLowerCase().includes(q)):names;
    if(!matches.length||!q&&!document.activeElement===inp){list.classList.remove("open");return;}
    list.innerHTML=matches.map(n=>`<div class="site-ac-item">${n}</div>`).join("");
    list.classList.add("open");
    list.querySelectorAll(".site-ac-item").forEach(item=>{
      item.addEventListener("mousedown",e=>{e.preventDefault();inp.value=item.textContent;list.classList.remove("open");});
      item.addEventListener("touchend",e=>{e.preventDefault();inp.value=item.textContent;list.classList.remove("open");inp.blur();});
    });
  }
  inp.addEventListener("input",showAc);
  inp.addEventListener("focus",showAc);
  inp.addEventListener("blur",()=>setTimeout(()=>list.classList.remove("open"),150));
}

let curKind="미팅";
document.getElementById("kindChips").addEventListener("click",e=>{
  const c=e.target.closest(".chip");if(!c)return;
  document.querySelectorAll("#kindChips .chip").forEach(x=>x.classList.remove("on"));
  c.classList.add("on");curKind=c.dataset.k;});
function setKind(k){curKind=k;document.querySelectorAll("#kindChips .chip").forEach(x=>x.classList.toggle("on",x.dataset.k===k));}
let curWeek=null;
function openModal(id,presetDate,presetWeek){
  editId=id;curWeek=null;promoteTodoId=null;
  const g=x=>document.getElementById(x);
  if(id){const ev=DATA.find(x=>x.id===id);
    curWeek=ev.week||null;
    g("mTitle").textContent=ev.week?"주간 메모 수정":"일정 수정";
    g("fDate").value=ev.date||"";g("fTime").value=ev.time||"";g("fSite").value=ev.site||"";
    g("fDesc").value=ev.desc||"";g("fMemo").value=ev.memo||"";
    setKind(ev.kind||"미팅");g("delBtn").style.display="block";
  }else if(presetWeek){
    curWeek=presetWeek;
    g("mTitle").textContent="주간 메모 추가 (날짜 미정)";
    g("fDate").value="";g("fTime").value="";g("fSite").value="";
    g("fDesc").value="";g("fMemo").value="";
    setKind("기타");g("delBtn").style.display="none";
  }else{
    g("mTitle").textContent="일정 추가";
    g("fDate").value=presetDate||todayStr();g("fTime").value="";g("fSite").value="";
    g("fDesc").value="";g("fMemo").value="";
    setKind("미팅");g("delBtn").style.display="none";
  }
  ov.classList.add("show");
  initSiteAc();
}
function closeModal(){ov.classList.remove("show");}
document.getElementById("addBtn").onclick=()=>{if(view==="worker")openWorkerModal(null);else openModal(null);};
document.getElementById("cancelBtn").onclick=()=>{promoteTodoId=null;closeModal();};
// ov.onclick=e=>{if(e.target===ov)closeModal();}; // 바깥 클릭 시 닫기 비활성화
document.getElementById("saveBtn").onclick=()=>{
  const g=x=>document.getElementById(x).value;
  const date=g("fDate").trim();
  const rec={date:date,time:g("fTime"),site:g("fSite").trim(),desc:g("fDesc").trim(),
    kind:curKind,memo:g("fMemo").trim()};
  if(!rec.site){alert("현장/고객명은 입력해 주세요");return;}
  if(promoteTodoId&&!date){alert("일정으로 올리려면 날짜를 입력해 주세요");return;}
  if(date){rec.week=null;}
  else if(curWeek){rec.date="";rec.week=curWeek;}
  else{alert("날짜를 입력하거나, 주간 메모로 추가해 주세요");return;}
  if(editId){const ex=DATA.find(x=>x.id===editId);Object.assign(ex,rec);if(!ex.status)ex.status="예정";}
  else{rec.id=Date.now();rec.status="예정";DATA.push(rec);}
  save();
  if(promoteTodoId){const t=TODOS.find(x=>x.id===promoteTodoId);if(t)t.promoted=true;saveTodos();promoteTodoId=null;}
  closeModal();render();
};
document.getElementById("delBtn").onclick=()=>{
  if(!confirm("이 일정을 삭제할까요?"))return;
  DATA=DATA.filter(x=>x.id!==editId);save();closeModal();render();
};

/* ===== 작업자 모달 ===== */
const wov=document.getElementById("wov");
let wEditId=null;
let wCurKind="전기";
let wCurPaid="미지급";
document.getElementById("wKindChips").addEventListener("click",e=>{

document.getElementById("wPaidChips").addEventListener("click",e=>{
  const c=e.target.closest(".chip");if(!c)return;
  document.querySelectorAll("#wPaidChips .chip").forEach(x=>x.classList.remove("on"));

function setWPaid(p){wCurPaid=p;document.querySelectorAll("#wPaidChips .chip").forEach(x=>x.classList.toggle("on",x.dataset.p===p));}
function getWorkerNames(){

}

  const inp=document.getElementById("wWorker");

function openWorkerModal(id,presetDate){
  wEditId=id;

    g("wTitle").textContent="작업 추가";
    g("wDate").value=presetDate||todayStr();g("wTime").value="";g("wWorker").value="";
    g("wSite").value="";g("wPay").value="";g("wMemo").value="";
    setWKind("전기");setWPaid("미지급");g("wDel").style.display="none";
  }
  wov.classList.add("show");
  initWorkerAc();
}
function closeWorkerModal(){wov.classList.remove("show");}
document.getElementById("wCancel").onclick=closeWorkerModal;
document.getElementById("wSave").onclick=()=>{
  const g=x=>document.getElementById(x).value;
  const date=g("wDate").trim();
  const worker=g("wWorker").trim();
  if(!date){alert("날짜를 입력해 주세요");return;}
  if(!worker){alert("작업자 이름을 입력해 주세요");return;}
  const payNum=Number(String(g("wPay")).replace(/[^\d.-]/g,""))||0;
  const rec={date:date,time:g("wTime"),worker:worker,site:g("wSite").trim(),
    kind:wCurKind,pay:payNum,paid:wCurPaid,memo:g("wMemo").trim()};
  if(wEditId){const ex=WORKERS.find(x=>x.id===wEditId);Object.assign(ex,rec);}
  else{rec.id=Date.now();WORKERS.push(rec);}
  saveWorkers();closeWorkerModal();render();
};
document.getElementById("wDel").onclick=()=>{
  if(!confirm("이 작업 기록을 삭제할까요?"))return;
  WORKERS=WORKERS.filter(x=>x.id!==wEditId);saveWorkers();closeWorkerModal();render();
};
// 작업자 일별 보기 (달력에서 +N명 클릭 시) — 기존 dayov 재사용
function openWorkerDay(ds){
  const list=wkOf(ds);
  const d=new Date(ds+"T00:00");
  document.getElementById("dayTitle").textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]}) 작업자`;
  let html="";
  list.forEach(w=>{
    const isPaid=w.paid==="지급완료";
    html+=`<div class="dl-row ${isPaid?'done':''}" data-wid="${w.id}">
      <div class="dl-time ${w.time?'':'none'}">${w.time||"종일"}</div>
      <div class="dl-body"><div class="dl-site">${w.worker||"(이름없음)"} · ${fmtWon(w.pay)}원</div>
      <div class="dl-desc">${w.site||"현장 미정"}${w.memo?" · "+w.memo:""}</div>
      <span class="tag wk wk-${w.kind}" style="margin-top:5px;display:inline-block">${w.kind}</span></div></div>`;

  document.getElementById("dayList").innerHTML=html;

}
